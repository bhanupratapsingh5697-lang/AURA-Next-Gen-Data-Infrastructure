<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Aura</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'><path d='M50 5 L95 25 L95 75 L50 95 L5 75 L5 25 Z' stroke='%23050505' stroke-width='8'/><circle cx='50' cy='50' r='18' fill='%23ff3366'/></svg>">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="noise-overlay"></div>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    
    <div class="preloader">
      <div class="preloader-text">CONTACT.</div>
    </div>

    <canvas id="webgl"></canvas>
    
    <div class="navbar-wrap">
      <nav class="navbar">
        <a href="/index.html" class="logo">
          <svg class="aura-icon" viewBox="0 0 100 100" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 5 L95 25 L95 75 L50 95 L5 75 L5 25 Z" stroke="currentColor" stroke-width="8"/>
            <circle cx="50" cy="50" r="18" fill="var(--accent)"/>
          </svg>
          AURA
        </a>
        <div class="menu-toggle"><span></span><span></span></div>
        <div class="nav-links">
          <a href="/index.html" class="nav-item">Home</a>
          <a href="/about.html" class="nav-item">About</a>
          <a href="/services.html" class="nav-item">Services</a>
          <a href="/contact.html" class="nav-item active">Contact</a>
        </div>
      </nav>
    </div>

    <div class="content-wrapper">
      <section class="section" style="padding-top: 25vh;">
        <h1 class="huge-title" style="margin-bottom: 5rem;" data-parallax="0.5">SAY HELLO</h1>
        
        <form class="adv-form" style="max-width: 800px;" data-parallax="-0.2">
          <input type="text" placeholder="WHAT IS YOUR NAME?" required>
          <input type="email" placeholder="YOUR EMAIL ADDRESS?" required>
          <textarea rows="3" placeholder="TELL US ABOUT YOUR PROJECT..." required></textarea>
          
          <button type="submit" class="btn-magnetic" style="border: none; margin-top: 3rem;"><span class="btn-text">SEND INQUIRY</span></button>
        </form>
      </section>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
